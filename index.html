<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝙅𝙍|Fahrenight¹⁹³³☪</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/png" href="mor_silah.png">
    <style>
        :root {
            --bg: #030303;
            --surface: rgba(14, 14, 16, 0.75);
            --surface-hover: rgba(20, 20, 23, 0.85);
            --border: rgba(255, 255, 255, 0.055);
            --border-hover: rgba(255, 255, 255, 0.12);
            --text: #f2f2f2;
            --text-muted: #5a5a5a;
            --gold: #c8a96e;
            --gold-dim: rgba(200, 169, 110, 0.12);
            --gold-border: rgba(200, 169, 110, 0.25);
            --red: #c95e5e;
            --red-dim: rgba(201, 94, 94, 0.1);
            --shadow: 0 32px 64px rgba(0, 0, 0, 0.55);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Preloader */
        #preloader {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1s cubic-bezier(0.23, 1, 0.32, 1), visibility 1s;
        }
        .preloader-inner {
            text-align: center;
            cursor: pointer;
            padding: 40px;
        }
        .preloader-text {
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            font-size: 0.85rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.35);
            transition: color 0.6s ease;
        }
        .preloader-inner:hover .preloader-text {
            color: rgba(255,255,255,0.9);
        }
        .preloader-line {
            width: 40px;
            height: 1px;
            background: rgba(255,255,255,0.15);
            margin: 20px auto 0;
            transition: width 0.6s ease, background 0.6s ease;
        }
        .preloader-inner:hover .preloader-line {
            width: 80px;
            background: rgba(255,255,255,0.4);
        }

        /* Video */
        #video-background {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -2;
            filter: brightness(0.25) contrast(1.05) saturate(0.85);
        }

        /* Particles */
        #particle-canvas {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
        }

        /* Scanlines - ultra subtle */
        .scanlines {
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 3px,
                rgba(0,0,0,0.08) 3px,
                rgba(0,0,0,0.08) 6px
            );
            pointer-events: none;
            z-index: 999;
            opacity: 0.15;
        }

        /* Mute Button */
        #mute-toggle {
            position: fixed;
            top: 32px;
            right: 32px;
            z-index: 100;
            background: transparent;
            border: 1px solid var(--border);
            color: rgba(255,255,255,0.35);
            width: 44px;
            height: 44px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            backdrop-filter: blur(10px);
        }
        #mute-toggle:hover {
            border-color: var(--border-hover);
            color: rgba(255,255,255,0.9);
            background: rgba(255,255,255,0.03);
            transform: scale(1.05);
        }

        /* Container */
        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            perspective: 1200px;
            position: relative;
            z-index: 10;
        }

        /* Profile Card */
        .profile-card {
            background: var(--surface);
            backdrop-filter: blur(50px);
            -webkit-backdrop-filter: blur(50px);
            border-radius: 32px;
            padding: 50px 36px 40px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.04);
            position: relative;
            overflow: hidden;
            transform-style: preserve-3d;
            transition: transform 0.15s ease-out, box-shadow 0.6s ease;
            text-align: center;
        }
        .profile-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            opacity: 0.6;
        }
        .profile-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(
                600px circle at var(--mx, 50%) var(--my, 50%),
                rgba(255,255,255,0.035),
                transparent 60%
            );
            pointer-events: none;
            border-radius: 32px;
            opacity: 0;
            transition: opacity 0.6s ease;
        }
        .profile-card:hover::after {
            opacity: 1;
        }

        /* Views Badge */
        .views-badge {
            position: absolute;
            top: 24px;
            right: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            font-weight: 500;
            color: rgba(255,255,255,0.35);
            letter-spacing: 0.5px;
            font-variant-numeric: tabular-nums;
            z-index: 5;
            transition: color 0.3s ease;
        }
        .views-badge:hover {
            color: rgba(255,255,255,0.7);
        }
        .views-badge i {
            font-size: 0.85em;
            color: rgba(255,255,255,0.25);
            transition: color 0.3s ease;
        }
        .views-badge:hover i {
            color: var(--gold);
        }

        /* Avatar */
        .avatar-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 22px;
        }
        .main-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            z-index: 2;
        }
        .avatar-wrapper:hover .main-avatar {
            transform: scale(1.06);
            border-color: rgba(255,255,255,0.25);
            box-shadow: 0 16px 50px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05);
        }

        /* Name */
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff;
            text-align: center;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
            position: relative;
            z-index: 2;
        }

        /* Location */
        .location {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 400;
            margin-bottom: 36px;
            position: relative;
            z-index: 2;
        }
        .location i {
            font-size: 0.85em;
            color: var(--red);
            opacity: 0.8;
        }
        .mini-location-badge {
            background: var(--red-dim);
            border: 1px solid rgba(201, 94, 94, 0.15);
            color: var(--red);
            padding: 2px 7px;
            border-radius: 5px;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-left: 4px;
        }

        /* Link Info */
        .link-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 14px 20px;
            margin-bottom: 36px;
            position: relative;
            z-index: 2;
            transition: all 0.4s ease;
        }
        .link-info:hover {
            background: rgba(0,0,0,0.3);
            border-color: rgba(255,255,255,0.08);
        }
        .link-info::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
            transition: left 0.6s;
        }
        .link-info:hover::before {
            left: 100%;
        }

        /* Mini Profile */
        .mini-profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .mini-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.4s ease;
        }
        .mini-profile:hover .mini-avatar {
            border-color: rgba(255,255,255,0.25);
            transform: scale(1.1);
        }
        .discord-username {
            font-size: 0.9rem;
            font-weight: 500;
            color: rgba(255,255,255,0.75);
            cursor: pointer;
            transition: color 0.3s ease;
            letter-spacing: 0.3px;
        }
        .discord-username:hover {
            color: #fff;
        }

        /* Badges */
        .badges-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 30px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            border-radius: 8px;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .badge-vip {
            background: var(--gold-dim);
            border: 1px solid var(--gold-border);
            color: var(--gold);
            padding: 0 12px;
        }
        .badge-vip:hover {
            background: rgba(200, 169, 110, 0.2);
            border-color: rgba(200, 169, 110, 0.4);
            transform: translateY(-1px);
        }
        .badge-guard {
            width: 30px;
            height: 30px;
            padding: 0;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.45);
        }
        .badge-guard:hover {
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.8);
            transform: translateY(-1px) rotate(5deg);
        }

        /* Social Links */
        .social-links {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            position: relative;
            z-index: 2;
        }
        .social-links a {
            position: relative;
            height: 76px;
            background: rgba(255,255,255,0.015);
            border: 1px solid var(--border);
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: rgba(255,255,255,0.35);
            text-decoration: none;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            overflow: hidden;
        }
        .social-links a::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(255,255,255,0.06), transparent 70%);
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .social-links a:hover::before {
            opacity: 1;
        }
        .social-links a i {
            font-size: 1.25em;
            position: relative;
            z-index: 1;
            transition: transform 0.4s ease;
        }
        .social-links a span {
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            position: relative;
            z-index: 1;
        }
        .social-links a:hover {
            transform: translateY(-4px);
            border-color: var(--border-hover);
            box-shadow: 0 16px 32px rgba(0,0,0,0.4);
        }
        .social-links a:hover i {
            transform: scale(1.15);
        }
        .social-links a[title="Discord"]:hover { color: #5865F2; background: rgba(88,101,242,0.05); }
        .social-links a[title="Steam"]:hover { color: #66c0f4; background: rgba(102,192,244,0.05); }
        .social-links a[title="GitHub"]:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .social-links a[title="Centre"]:hover { color: #00ff88; background: rgba(0,255,136,0.05); }

        /* Tag */
        .tag {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.12);
            margin-top: 28px;
            text-align: center;
            letter-spacing: 10px;
            font-weight: 700;
            position: relative;
            z-index: 2;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(14, 14, 16, 0.95);
            border: 1px solid rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.9);
            padding: 14px 28px;
            border-radius: 14px;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.3px;
            backdrop-filter: blur(30px);
            box-shadow: 0 24px 48px rgba(0,0,0,0.5);
            z-index: 10001;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast i { font-size: 1.1em; color: var(--gold); }

        /* Reveal Animations */
        .reveal {
            opacity: 0;
            transform: translateY(16px);
            animation: reveal 1s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }
        .reveal-1 { animation-delay: 0.1s; }
        .reveal-2 { animation-delay: 0.25s; }
        .reveal-3 { animation-delay: 0.4s; }
        .reveal-4 { animation-delay: 0.55s; }
        .reveal-5 { animation-delay: 0.7s; }
        .reveal-6 { animation-delay: 0.85s; }

        @keyframes reveal {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container { padding: 16px; }
            .profile-card { padding: 40px 24px 32px; border-radius: 26px; }
            h1 { font-size: 1.4rem; }
            .social-links a { height: 68px; border-radius: 14px; }
            .social-links a i { font-size: 1.1em; }
        }
    </style>
</head>
<body>

    <div class="scanlines"></div>

    <div id="preloader">
        <div class="preloader-inner">
            <div class="preloader-text">Click To Enter</div>
            <div class="preloader-line"></div>
        </div>
    </div>

    <video autoplay loop muted playsinline id="video-background">
        <source src="arka_plan_video.mp4" type="video/mp4">
        Tarayıcınız video etiketini desteklemiyor.
    </video>

    <canvas id="particle-canvas"></canvas>

    <button id="mute-toggle" title="Sesi Aç/Kapat">
        <i class="fas fa-volume-off"></i>
    </button>

    <div class="container">
        <div class="profile-card" id="profile-card">

            <div class="views-badge reveal reveal-1">
                <i class="fa-regular fa-eye"></i>
                <span id="view-counter">0</span>
            </div>

            <div class="avatar-wrapper reveal reveal-2">
                <img src="avatar.jpg" alt="Profil Resmi" class="main-avatar">
            </div>

            <h1 class="reveal reveal-3">𝙅𝙍|Fahrenight¹⁹³³☪</h1>

            <p class="location reveal reveal-4">
                <i class="fa-solid fa-location-dot"></i>
                Germany
                <span class="mini-location-badge">DEU</span>
            </p>

            <div class="link-info reveal reveal-5">
                <div class="mini-profile">
                    <img src="mini-avatar.jpg" alt="Mini Profil" class="mini-avatar">
                    <span class="discord-username" id="discord-user">tr_aytekin</span>
                </div>
                <div class="badges-row">
                    <span class="badge badge-vip" title="VIP Üye">⚡ VIP</span>
                    <span class="badge badge-guard" title="Guard"><i class="fa-solid fa-shield-halved"></i></span>
                </div>
            </div>

            <div class="social-links reveal reveal-6">
                <a href="javascript:void(0)" onclick="copyDiscord('tr_aytekin')" title="Discord">
                    <i class="fab fa-discord"></i>
                    <span>Discord</span>
                </a>
                <a href="https://steamcommunity.com/profiles/76561199172430315/" target="_blank" title="Steam">
                    <i class="fab fa-steam"></i>
                    <span>Steam</span>
                </a>
                <a href="https://github.com/ZradoW" target="_blank" title="GitHub">
                    <i class="fab fa-github"></i>
                    <span>GitHub</span>
                </a>
                <a href="https://zradow.github.io/No2/" target="_blank" title="Centre">
                    <i class="fas fa-home"></i>
                    <span>Centre</span>
                </a>
            </div>

            <p class="tag">MA</p>

        </div>
    </div>

    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toast-message">Kopyalandı</span>
    </div>

    <script>
        const video = document.getElementById('video-background');
        const muteToggle = document.getElementById('mute-toggle');
        const preloader = document.getElementById('preloader');
        const profileCard = document.getElementById('profile-card');
        const viewCounter = document.getElementById('view-counter');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toast-message');

        // Preloader
        preloader.addEventListener('click', () => {
            preloader.style.opacity = '0';
            preloader.style.visibility = 'hidden';
            setTimeout(() => {
                preloader.style.display = 'none';
                animateCounter(469);
            }, 1000);
        });

        // Mute
        muteToggle.addEventListener('click', () => {
            video.muted = !video.muted;
            const icon = muteToggle.querySelector('i');
            icon.className = video.muted ? 'fas fa-volume-off' : 'fas fa-volume-up';
            muteToggle.style.color = video.muted ? 'rgba(255,255,255,0.35)' : 'rgba(255,255,255,0.9)';
            muteToggle.style.borderColor = video.muted ? 'var(--border)' : 'rgba(255,255,255,0.2)';
        });

        // Counter - easeOutExpo
        function animateCounter(target, duration = 2500) {
            const start = performance.now();
            function update(now) {
                const elapsed = now - start;
                const t = Math.min(elapsed / duration, 1);
                const ease = t === 1 ? 1 : 1 - Math.pow(2, -10 * t);
                viewCounter.textContent = Math.floor(target * ease);
                if (t < 1) requestAnimationFrame(update);
            }
            requestAnimationFrame(update);
        }

        // Discord
        function copyDiscord(username) {
            navigator.clipboard.writeText(username).then(() => {
                showToast(`Discord kopyalandı: ${username}`);
            }).catch(() => showToast('Kopyalama başarısız', true));
        }
        document.getElementById('discord-user').addEventListener('click', () => copyDiscord('tr_aytekin'));

        // Toast
        function showToast(msg, err) {
            toastMessage.textContent = msg;
            const icon = toast.querySelector('i');
            icon.className = err ? 'fas fa-exclamation-circle' : 'fas fa-check-circle';
            icon.style.color = err ? '#c95e5e' : 'var(--gold)';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // 3D Tilt - very subtle
        profileCard.addEventListener('mousemove', (e) => {
            const rect = profileCard.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const cx = rect.width / 2;
            const cy = rect.height / 2;
            const rx = ((y - cy) / cy) * -3;
            const ry = ((x - cx) / cx) * 3;
            profileCard.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg)`;
            profileCard.style.setProperty('--mx', `${(x/rect.width)*100}%`);
            profileCard.style.setProperty('--my', `${(y/rect.height)*100}%`);
        });
        profileCard.addEventListener('mouseleave', () => {
            profileCard.style.transform = 'rotateX(0) rotateY(0)';
        });

        // Particles - minimal, elegant
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const mouse = { x: null, y: null };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', e => { mouse.x = e.x; mouse.y = e.y; });

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.2 + 0.2;
                this.vx = (Math.random() - 0.5) * 0.15;
                this.vy = (Math.random() - 0.5) * 0.15;
                this.alpha = Math.random() * 0.3 + 0.1;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;

                if (mouse.x != null) {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const d = Math.sqrt(dx*dx + dy*dy);
                    if (d < 100) {
                        const f = (100 - d) / 100;
                        this.vx -= (dx/d) * f * 0.01;
                        this.vy -= (dy/d) * f * 0.01;
                    }
                }
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            particles = [];
            const count = Math.min(window.innerWidth / 25, 60);
            for (let i = 0; i < count; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const d = Math.sqrt(dx*dx + dy*dy);
                    if (d < 80) {
                        ctx.strokeStyle = `rgba(255,255,255,${(1 - d/80) * 0.04})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        init();
        animate();

        // Magnetic social buttons
        document.querySelectorAll('.social-links a').forEach(btn => {
            btn.addEventListener('mousemove', (e) => {
                const rect = btn.getBoundingClientRect();
                const x = e.clientX - rect.left - rect.width / 2;
                const y = e.clientY - rect.top - rect.height / 2;
                btn.style.transform = `translate(${x * 0.15}px, ${y * 0.15}px) translateY(-4px)`;
            });
            btn.addEventListener('mouseleave', () => {
                btn.style.transform = '';
            });
        });
    </script>
</body>
</html>
